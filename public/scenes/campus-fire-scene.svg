<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1930"/>
      <stop offset="100%" stop-color="#040b14"/>
    </linearGradient>
    <linearGradient id="ceiling" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#15345e"/>
      <stop offset="100%" stop-color="#0c203a"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#223243"/>
      <stop offset="100%" stop-color="#101923"/>
    </linearGradient>
    <linearGradient id="leftWall" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b8c5d0"/>
      <stop offset="100%" stop-color="#dbe4eb"/>
    </linearGradient>
    <linearGradient id="rightWall" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#e7edf2"/>
      <stop offset="100%" stop-color="#bcc8d1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6fb" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#ccd7e2" stop-opacity=".9"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <polygon points="120,120 1480,120 1240,280 360,280" fill="url(#ceiling)"/>
  <polygon points="0,900 1600,900 1230,520 370,520" fill="url(#floor)"/>
  <polygon points="0,150 370,280 370,520 0,900" fill="url(#leftWall)"/>
  <polygon points="1600,150 1230,280 1230,520 1600,900" fill="url(#rightWall)"/>

  <polygon points="220,214 430,290 430,780 220,900" fill="#c5d0d8" opacity=".72"/>
  <polygon points="1380,214 1170,290 1170,780 1380,900" fill="#cad4db" opacity=".68"/>

  <polygon points="520,310 775,310 775,605 520,662" fill="url(#glass)" stroke="#8798a7" stroke-width="12"/>
  <polygon points="520,344 775,344 775,365 520,365" fill="#c1272d"/>
  <circle cx="694" cy="404" r="34" fill="#d82929" stroke="#ffffff" stroke-width="11"/>
  <circle cx="617" cy="390" r="23" fill="#f15757" stroke="#ffffff" stroke-width="8"/>
  <rect x="602" y="468" width="110" height="86" rx="16" fill="#efefef" opacity=".75"/>
  <text x="552" y="290" fill="#b8f3ff" font-size="28" font-family="Microsoft YaHei, Arial">室内消防栓柜</text>

  <g transform="translate(950 335)">
    <rect x="0" y="20" width="128" height="320" rx="56" fill="#d72626"/>
    <rect x="32" y="-20" width="64" height="70" rx="16" fill="#263543"/>
    <path d="M64 -20 C88 -52 122 -60 164 -28" fill="none" stroke="#37495d" stroke-width="14"/>
    <rect x="36" y="115" width="56" height="66" rx="8" fill="#f2f5f8" opacity=".92"/>
    <rect x="-28" y="340" width="184" height="16" rx="8" fill="#7f90a0"/>
  </g>
  <text x="910" y="305" fill="#b8f3ff" font-size="28" font-family="Microsoft YaHei, Arial">灭火器点位</text>

  <g transform="translate(1155 318)">
    <rect x="0" y="0" width="150" height="116" rx="22" fill="#11a46d"/>
    <text x="28" y="72" fill="#f1fff7" font-size="46" font-family="Arial Black">EXIT</text>
    <path d="M18 62 h-44" stroke="#f1fff7" stroke-width="14" stroke-linecap="round"/>
    <path d="M-8 40 l-38 22 38 22" fill="none" stroke="#f1fff7" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1110" y="292" fill="#b8f3ff" font-size="28" font-family="Microsoft YaHei, Arial">疏散标志</text>

  <polygon points="690,640 920,640 1000,760 620,760" fill="#a96e3e"/>
  <polygon points="668,610 942,610 1028,640 592,640" fill="#c6884f"/>
  <text x="716" y="596" fill="#ffd9b1" font-size="24" font-family="Microsoft YaHei, Arial">消防通道占用物</text>

  <g opacity=".45" stroke="#6adfff" stroke-width="4" stroke-dasharray="12 10" fill="none">
    <path d="M815 792 C815 738 842 710 905 684"/>
    <path d="M815 792 C790 744 742 702 676 676"/>
  </g>
  <g filter="url(#softGlow)">
    <circle cx="812" cy="792" r="18" fill="#8cf6ff"/>
    <circle cx="812" cy="792" r="42" fill="none" stroke="#8cf6ff" stroke-width="3" opacity=".6"/>
  </g>
  <text x="748" y="842" fill="#d6fbff" font-size="26" font-family="Microsoft YaHei, Arial">小车巡检位置</text>

  <g opacity=".22" stroke="#82f2ff" stroke-width="2">
    <line x1="360" y1="280" x2="1230" y2="280"/>
    <line x1="330" y1="345" x2="1270" y2="345"/>
    <line x1="290" y1="425" x2="1315" y2="425"/>
    <line x1="240" y1="520" x2="1365" y2="520"/>
    <line x1="185" y1="635" x2="1425" y2="635"/>
  </g>

  <text x="88" y="88" fill="#8af1ff" font-size="54" font-family="Microsoft YaHei, Arial">智慧校园消防巡检场景图</text>
  <text x="90" y="132" fill="#caefff" font-size="24" font-family="Microsoft YaHei, Arial">教学楼走廊综合巡检区域：消防栓、灭火器、疏散标志与通道占用风险联动展示</text>
</svg>
